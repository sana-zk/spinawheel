<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin The Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161619;
    --border: #2a2a2e;
    --accent: #f5c542;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #6b6b72;
    --winner-glow: rgba(245, 197, 66, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(245,197,66,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 40px;
    align-items: start;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    letter-spacing: 0.04em;
    color: var(--accent);
    line-height: 1;
    grid-column: 1 / -1;
    margin-bottom: -10px;
  }

  h1 span { color: var(--text); }

  /* Wheel Section */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .wheel-wrapper {
    position: relative;
    width: min(420px, 90vw);
    height: min(420px, 90vw);
    filter: drop-shadow(0 0 40px rgba(245,197,66,0.12));
  }

  /* Pointer */
  .pointer {
    position: absolute;
    right: -18px;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-right: 36px solid var(--accent);
    filter: drop-shadow(0 0 8px var(--accent));
    z-index: 10;
  }

  canvas {
    border-radius: 50%;
    display: block;
  }

  /* Center button on wheel */
  .spin-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .spin-center:hover { background: rgba(245,197,66,0.1); box-shadow: 0 0 20px var(--winner-glow); }

  /* Task input */
  .task-bar {
    width: min(420px, 90vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
  }

  .task-bar label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .task-bar input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--text);
  }
  .task-bar input::placeholder { color: var(--muted); }

  /* Spin button */
  .spin-btn {
    width: min(420px, 90vw);
    padding: 18px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--winner-glow); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* Sidebar */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 10px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .count-badge {
    background: rgba(245,197,66,0.12);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .add-row {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .add-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--muted); }

  .add-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
    line-height: 1;
  }
  .add-btn:hover { background: #ffd166; transform: scale(1.05); }

  .people-list {
    max-height: 380px;
    overflow-y: auto;
    padding: 8px;
  }

  .people-list::-webkit-scrollbar { width: 4px; }
  .people-list::-webkit-scrollbar-track { background: transparent; }
  .people-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .person-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background 0.15s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .person-item:hover { background: rgba(255,255,255,0.04); }

  .person-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .person-name {
    flex: 1;
    font-size: 0.92rem;
    font-weight: 500;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    opacity: 0;
  }
  .person-item:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { background: rgba(255,80,80,0.15); color: #ff5050; }

  /* Winner modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 24px;
    padding: 48px 56px;
    text-align: center;
    box-shadow: 0 0 80px var(--winner-glow);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 400px;
    width: 90%;
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal .emoji { font-size: 3rem; margin-bottom: 12px; }

  .modal h3 {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .modal .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 0 30px var(--winner-glow);
  }

  .modal .task-label {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .modal .task-label strong { color: var(--text); font-weight: 500; }

  .modal-close {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .modal-close:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--winner-glow); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    z-index: 200;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 780px) {
    .container { grid-template-columns: 1fr; }
    h1 { margin-bottom: 0; }
    .wheel-section { order: 1; }
    .sidebar { order: 2; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>SPIN <span>THE</span> WHEEL</h1>

  <!-- Wheel Section -->
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheelCanvas" width="420" height="420"></canvas>
      <div class="pointer"></div>
      <div class="spin-center" id="spinCenterBtn">SPIN</div>
    </div>

    <div class="task-bar">
      <label>Task / Assignment</label>
      <input type="text" id="taskInput" placeholder="e.g. Lead today's standup..." />
    </div>

    <button class="spin-btn" id="spinBtn">🎰 SPIN THE WHEEL</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <h2>Participants</h2>
        <span class="count-badge" id="countBadge">11</span>
      </div>
      <div class="add-row">
        <input type="text" id="newPersonInput" placeholder="Add a person..." />
        <button class="add-btn" id="addBtn">+</button>
      </div>
      <div class="people-list" id="peopleList"></div>
    </div>
  </div>
</div>

<!-- Winner Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="emoji">🎉</div>
    <h3>Selected for task</h3>
    <div class="winner-name" id="winnerName">—</div>
    <div class="task-label" id="taskDisplay"></div>
    <button class="modal-close" id="modalClose">AWESOME!</button>
  </div>
</div>

<script>
  const COLORS = [
    '#f5c542','#ff6b35','#e63946','#4ecdc4','#45b7d1',
    '#96ceb4','#ffeaa7','#fd79a8','#a29bfe','#74b9ff',
    '#00cec9','#fdcb6e','#e17055','#81ecec','#6c5ce7',
    '#fab1a0','#55efc4','#b2bec3','#dfe6e9','#636e72'
  ];

  let people = ['Sana','Donthy','Ali','Salsabeel','Yara','Khaldoon','Sahar','Wesaam','Ahmed','Praveena','Sameer'];
  let isSpinning = false;
  let currentAngle = 0;

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const spinCenterBtn = document.getElementById('spinCenterBtn');
  const peopleList = document.getElementById('peopleList');
  const newPersonInput = document.getElementById('newPersonInput');
  const addBtn = document.getElementById('addBtn');
  const countBadge = document.getElementById('countBadge');
  const modalOverlay = document.getElementById('modalOverlay');
  const winnerName = document.getElementById('winnerName');
  const taskDisplay = document.getElementById('taskDisplay');
  const modalClose = document.getElementById('modalClose');
  const taskInput = document.getElementById('taskInput');

  function drawWheel() {
    const n = people.length;
    if (n === 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#2a2a2e';
      ctx.beginPath();
      ctx.arc(210, 210, 200, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6b6b72';
      ctx.font = '600 18px DM Sans';
      ctx.textAlign = 'center';
      ctx.fillText('Add people to start', 210, 215);
      return;
    }

    const sliceAngle = (2 * Math.PI) / n;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = 200;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Outer ring shadow
    ctx.save();
    ctx.shadowColor = 'rgba(245,197,66,0.2)';
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(245,197,66,0.3)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();

    for (let i = 0; i < n; i++) {
      const start = currentAngle + i * sliceAngle;
      const end = start + sliceAngle;
      const color = COLORS[i % COLORS.length];

      // Slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, start, end);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();

      // Divider lines
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, start, end);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Text
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + sliceAngle / 2);

      const textRadius = radius * 0.62;
      ctx.translate(textRadius, 0);

      ctx.fillStyle = '#0d0d0f';
      ctx.font = `600 ${n > 14 ? 10 : n > 10 ? 12 : 14}px DM Sans`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const name = people[i];
      const maxLen = n > 12 ? 8 : 11;
      const displayName = name.length > maxLen ? name.slice(0, maxLen - 1) + '…' : name;
      ctx.fillText(displayName, 0, 0);
      ctx.restore();
    }

    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 34, 0, Math.PI * 2);
    ctx.fillStyle = '#0d0d0f';
    ctx.fill();
    ctx.strokeStyle = 'rgba(245,197,66,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function renderList() {
    peopleList.innerHTML = '';
    countBadge.textContent = people.length;
    people.forEach((name, i) => {
      const item = document.createElement('div');
      item.className = 'person-item';
      item.innerHTML = `
        <div class="person-dot" style="background:${COLORS[i % COLORS.length]}"></div>
        <span class="person-name">${name}</span>
        <button class="remove-btn" data-index="${i}" title="Remove">✕</button>
      `;
      peopleList.appendChild(item);
    });

    peopleList.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        people.splice(idx, 1);
        renderList();
        drawWheel();
      });
    });
  }

  function addPerson() {
    const val = newPersonInput.value.trim();
    if (!val) return;
    if (people.includes(val)) {
      newPersonInput.style.borderColor = '#ff5050';
      setTimeout(() => newPersonInput.style.borderColor = '', 1000);
      return;
    }
    people.push(val);
    newPersonInput.value = '';
    renderList();
    drawWheel();
  }

  function getWinnerFromAngle() {
    if (people.length === 0) return null;
    const sliceAngle = (2 * Math.PI) / people.length;
    // Pointer is at the right (angle 0 = 3 o'clock), but our wheel starts from top
    // We need to find which slice is at angle = 0 (right side where pointer is)
    const normalised = (((-currentAngle) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const idx = Math.floor(normalised / sliceAngle) % people.length;
    return people[idx];
  }

  function launchConfetti(winner) {
    const colors = ['#f5c542','#ff6b35','#4ecdc4','#fd79a8','#a29bfe','#55efc4'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (Math.random() * 10 + 6) + 'px';
      el.style.height = (Math.random() * 10 + 6) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      el.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function spin() {
    if (isSpinning || people.length < 2) return;
    isSpinning = true;
    spinBtn.disabled = true;

    const totalRotation = (Math.random() * 4 + 6) * 2 * Math.PI; // 6-10 full spins
    const duration = 4000 + Math.random() * 1500;
    const startAngle = currentAngle;
    const startTime = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = easeOut(progress);

      currentAngle = startAngle + totalRotation * eased;
      drawWheel();

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        spinBtn.disabled = false;
        const winner = getWinnerFromAngle();
        showWinner(winner);
      }
    }

    requestAnimationFrame(animate);
  }

  function showWinner(winner) {
    const task = taskInput.value.trim();
    winnerName.textContent = winner;
    taskDisplay.innerHTML = task
      ? `assigned to: <strong>${task}</strong>`
      : `has been selected!`;
    modalOverlay.classList.add('show');
    launchConfetti(winner);
  }

  spinBtn.addEventListener('click', spin);
  spinCenterBtn.addEventListener('click', spin);
  addBtn.addEventListener('click', addPerson);
  newPersonInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPerson(); });
  modalClose.addEventListener('click', () => modalOverlay.classList.remove('show'));
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('show'); });

  // Init
  renderList();
  drawWheel();
</script>
</body>
</html>
