<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spin The Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161619;
    --border: #2a2a2e;
    --accent: #f5c542;
    --accent-dim: rgba(245,197,66,0.12);
    --accent-glow: rgba(245,197,66,0.35);
    --danger: #ff5050;
    --text: #f0ede8;
    --muted: #6b6b72;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 15%, rgba(245,197,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 85%, rgba(255,107,53,0.05) 0%, transparent 60%);
  }

  /* ── LAYOUT ── */
  .app {
    position: relative; z-index: 1;
    max-width: 1060px;
    margin: 0 auto;
    padding: 28px;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
    grid-template-areas: "hd hd" "wh sb";
    gap: 0 28px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .hdr {
    grid-area: hd;
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4vw, 3.4rem);
    letter-spacing: 0.05em; line-height: 1;
    color: var(--accent);
  }
  h1 span { color: var(--text); }
  .hdr-sub {
    font-size: 0.73rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding-bottom: 3px;
  }

  /* ── WHEEL COLUMN ── */
  .wheel-col {
    grid-area: wh;
    display: flex; flex-direction: column; align-items: center;
    gap: 18px; padding-bottom: 28px;
  }

  .wheel-wrapper {
    position: relative;
    width: min(440px, calc(100vw - 56px - 340px - 28px));
    aspect-ratio: 1;
    filter: drop-shadow(0 0 44px rgba(245,197,66,0.14));
  }

  canvas { display: block; width: 100%; height: 100%; border-radius: 50%; }

  .pointer {
    position: absolute;
    right: -28px; top: 50%; transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right: 32px solid var(--accent);
    filter: drop-shadow(0 0 7px var(--accent));
    z-index: 10;
  }

  .spin-hub {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 62px; height: 62px;
    border-radius: 50%;
    background: var(--bg); border: 3px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.1em;
    cursor: pointer; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    user-select: none;
  }
  .spin-hub:hover { background: var(--accent-dim); box-shadow: 0 0 20px var(--accent-glow); }
  .spin-hub:active { transform: translate(-50%, -50%) scale(0.91); }

  /* ── CONTROLS ── */
  .controls {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%;
    max-width: min(440px, calc(100vw - 56px - 340px - 28px));
  }

  .task-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 17px;
    transition: border-color 0.2s;
  }
  .task-bar:focus-within { border-color: rgba(245,197,66,0.45); }
  .task-bar label {
    display: block; font-size: 0.65rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 5px;
  }
  .task-bar input {
    width: 100%; background: transparent; border: none; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem; color: var(--text);
  }
  .task-bar input::placeholder { color: var(--muted); }

  .spin-btn {
    width: 100%; padding: 16px 20px;
    background: var(--accent); color: #0d0d0f;
    border: none; border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 0.12em;
    cursor: pointer; touch-action: manipulation;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--accent-glow); }
  .spin-btn:active { transform: translateY(1px); }
  .spin-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── SIDEBAR / PANEL ── */
  .sidebar {
    grid-area: sb;
    display: flex; flex-direction: column;
    padding-bottom: 28px;
  }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    display: flex; flex-direction: column;
    flex: 1;
  }

  .panel-hdr {
    padding: 14px 17px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-hdr h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 0.1em; color: var(--accent);
  }

  .badge {
    background: var(--accent-dim); color: var(--accent);
    font-size: 0.7rem; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }

  .add-row {
    display: flex; gap: 8px;
    padding: 11px 13px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .add-row input {
    flex: 1; min-width: 0;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 13px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--muted); }

  .add-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); color: #0d0d0f;
    border: none; font-size: 1.5rem; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.12s;
    touch-action: manipulation; line-height: 1;
  }
  .add-btn:hover { background: #ffd166; transform: scale(1.06); }
  .add-btn:active { transform: scale(0.94); }

  .people-list {
    overflow-y: auto; padding: 6px; flex: 1;
  }
  .people-list::-webkit-scrollbar { width: 4px; }
  .people-list::-webkit-scrollbar-track { background: transparent; }
  .people-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .p-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 10px;
    transition: background 0.15s;
    animation: sli 0.18s ease;
  }
  @keyframes sli { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:none; } }
  .p-item:hover { background: rgba(255,255,255,0.04); }

  .p-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .p-name {
    flex: 1; font-size: 0.88rem; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rm-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; touch-action: manipulation;
  }
  /* Desktop: show on hover only */
  @media (hover: hover) {
    .rm-btn { opacity: 0; }
    .p-item:hover .rm-btn { opacity: 1; }
  }
  .rm-btn:hover { background: rgba(255,80,80,0.15); color: var(--danger); }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-areas: "hd" "wh" "sb";
      padding: 18px 16px 32px;
      gap: 0;
      min-height: unset;
    }

    .hdr { margin-bottom: 16px; }
    .hdr-sub { display: none; }

    .wheel-col {
      align-items: center;
      gap: 14px;
      padding-bottom: 24px;
    }

    .wheel-wrapper {
      width: min(300px, calc(100vw - 48px));
    }

    .pointer {
      right: -22px;
      border-top-width: 13px;
      border-bottom-width: 13px;
      border-right-width: 26px;
    }

    .spin-hub { width: 54px; height: 54px; font-size: 0.68rem; }

    .controls { max-width: 100%; }
    .spin-btn { font-size: 1.15rem; padding: 15px; }

    .sidebar {
      padding-bottom: 0;
    }

    .panel {
      border-radius: 16px;
      flex: none;
    }

    .people-list {
      max-height: 320px;
    }
  }

  /* ── MODAL ── */
  .modal-wrap {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s;
  }
  .modal-wrap.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid rgba(245,197,66,0.45);
    border-radius: 22px;
    padding: clamp(28px, 8vw, 50px) clamp(24px, 8vw, 52px);
    text-align: center;
    box-shadow: 0 0 72px var(--accent-glow);
    animation: pop 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 370px; width: 100%;
  }
  @keyframes pop { from { transform: scale(0.72); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-emoji { font-size: 2.8rem; margin-bottom: 10px; }
  .modal-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.6rem, 10vw, 3.6rem);
    color: var(--accent); line-height: 1;
    margin-bottom: 10px;
    text-shadow: 0 0 34px var(--accent-glow);
    word-break: break-word;
  }
  .modal-task { font-size: 0.86rem; color: var(--muted); margin-bottom: 26px; line-height: 1.55; }
  .modal-task strong { color: var(--text); font-weight: 500; }
  .modal-ok {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--accent); color: #0d0d0f;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.12em;
    cursor: pointer; touch-action: manipulation;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .modal-ok:hover { transform: translateY(-2px); box-shadow: 0 6px 22px var(--accent-glow); }

  /* ── CONFETTI ── */
  .cf {
    position: fixed; z-index: 200; pointer-events: none;
    animation: cfall linear forwards;
    border-radius: 2px;
  }
  @keyframes cfall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(108vh) rotate(760deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="hdr">
    <h1>SPIN <span>THE</span> WHEEL</h1>
    <span class="hdr-sub">Pick someone for the task</span>
  </div>

  <!-- Wheel -->
  <div class="wheel-col">
    <div class="wheel-wrapper">
      <canvas id="wc"></canvas>
      <div class="pointer"></div>
      <div class="spin-hub" id="hub">SPIN</div>
    </div>
    <div class="controls">
      <div class="task-bar">
        <label>Task / Assignment</label>
        <input type="text" id="task" placeholder="e.g. Lead today's standup…" autocomplete="off">
      </div>
      <button class="spin-btn" id="spinBtn">🎰 SPIN THE WHEEL</button>
    </div>
  </div>

  <!-- Participants -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-hdr">
        <h2>Participants</h2>
        <span class="badge" id="badge">11</span>
      </div>
      <div class="add-row">
        <input type="text" id="newName" placeholder="Add a person…" autocomplete="off">
        <button class="add-btn" id="addBtn" aria-label="Add">+</button>
      </div>
      <div class="people-list" id="plist"></div>
    </div>
  </div>

</div>

<!-- Winner Modal -->
<div class="modal-wrap" id="mw">
  <div class="modal">
    <div class="modal-emoji">🎉</div>
    <div class="modal-eyebrow">Selected for task</div>
    <div class="modal-name" id="mName">—</div>
    <div class="modal-task" id="mTask"></div>
    <button class="modal-ok" id="mOk">Awesome!</button>
  </div>
</div>

<script>
  const COLS = [
    '#f5c542','#ff6b35','#e63946','#4ecdc4','#45b7d1',
    '#96ceb4','#ffeaa7','#fd79a8','#a29bfe','#74b9ff',
    '#00cec9','#fdcb6e','#e17055','#81ecec','#6c5ce7',
    '#fab1a0','#55efc4','#b2bec3','#ffd6a5','#caffbf'
  ];

  let people = ['Sana','Donthi','Ali','Salsabeel','Yara','Khaldoon','Sahar','Wisaam','Ahmed','Praveena','Sameer'];
  let spinning = false, angle = 0, csz = 400;

  const canvas  = document.getElementById('wc');
  const ctx     = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const hub     = document.getElementById('hub');
  const plist   = document.getElementById('plist');
  const newName = document.getElementById('newName');
  const addBtn  = document.getElementById('addBtn');
  const badge   = document.getElementById('badge');
  const mw      = document.getElementById('mw');
  const mName   = document.getElementById('mName');
  const mTask   = document.getElementById('mTask');
  const mOk     = document.getElementById('mOk');
  const taskIn  = document.getElementById('task');

  /* ── Canvas resize ── */
  function resize() {
    const w = canvas.parentElement.offsetWidth;
    if (w < 10) return;
    csz = w;
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = w * dpr;
    canvas.height = w * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  new ResizeObserver(resize).observe(canvas.parentElement);
  requestAnimationFrame(resize);

  /* ── Draw ── */
  function draw() {
    const s = csz, cx = s/2, cy = s/2, r = s/2 - 3, n = people.length;
    ctx.clearRect(0, 0, s, s);

    if (!n) {
      ctx.fillStyle = '#2a2a2e';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#6b6b72';
      ctx.font = `500 ${Math.max(11, s*.038)}px DM Sans`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Add people to start', cx, cy);
      return;
    }

    const sa = (2*Math.PI) / n;

    ctx.save();
    ctx.shadowColor = 'rgba(245,197,66,0.22)'; ctx.shadowBlur = 24;
    ctx.beginPath(); ctx.arc(cx, cy, r+2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(245,197,66,0.28)'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.restore();

    for (let i = 0; i < n; i++) {
      const s0 = angle + i*sa, s1 = s0 + sa;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s0, s1); ctx.closePath();
      ctx.fillStyle = COLS[i % COLS.length]; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(s0 + sa/2);
      ctx.translate(r * 0.6, 0);
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      const fs = n > 14 ? Math.max(8, s*.021) : n > 10 ? Math.max(9, s*.025) : Math.max(10, s*.030);
      ctx.font = `600 ${fs}px DM Sans`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const ml = n > 12 ? 7 : 10;
      const lbl = people[i].length > ml ? people[i].slice(0, ml-1) + '…' : people[i];
      ctx.fillText(lbl, 0, 0);
      ctx.restore();
    }

    const cr = Math.max(20, s * .075);
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2);
    ctx.fillStyle = '#0d0d0f'; ctx.fill();
    ctx.strokeStyle = 'rgba(245,197,66,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  }

  /* ── Helpers ── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Render list ── */
  function renderList() {
    plist.innerHTML = '';
    badge.textContent = people.length;
    people.forEach((name, i) => {
      const el = document.createElement('div');
      el.className = 'p-item';
      el.innerHTML = `
        <div class="p-dot" style="background:${COLS[i % COLS.length]}"></div>
        <span class="p-name">${esc(name)}</span>
        <button class="rm-btn" data-i="${i}" aria-label="Remove">✕</button>`;
      plist.appendChild(el);
    });
    plist.querySelectorAll('.rm-btn').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        people.splice(+b.dataset.i, 1);
        renderList(); draw();
      });
    });
  }

  /* ── Add person ── */
  function add() {
    const v = newName.value.trim();
    if (!v) return;
    if (people.some(p => p.toLowerCase() === v.toLowerCase())) {
      newName.style.borderColor = 'var(--danger)';
      setTimeout(() => newName.style.borderColor = '', 1200);
      return;
    }
    people.push(v);
    newName.value = '';
    renderList(); draw();
    newName.focus();
  }

  /* ── Get winner ── */
  function getWinner() {
    if (!people.length) return null;
    const sa = (2*Math.PI) / people.length;
    const norm = ((-angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    return people[Math.floor(norm / sa) % people.length];
  }

  /* ── Spin ── */
  function spin() {
    if (spinning || people.length < 2) return;
    spinning = true; spinBtn.disabled = true;
    const tot = (6 + Math.random() * 5) * 2 * Math.PI;
    const dur = 3700 + Math.random() * 1700;
    const a0 = angle, t0 = performance.now();
    const ease = t => 1 - Math.pow(1 - t, 4);
    function frame(now) {
      const p = Math.min((now - t0) / dur, 1);
      angle = a0 + tot * ease(p); draw();
      if (p < 1) { requestAnimationFrame(frame); }
      else { spinning = false; spinBtn.disabled = false; showWinner(getWinner()); }
    }
    requestAnimationFrame(frame);
  }

  /* ── Show winner ── */
  function showWinner(w) {
    const t = taskIn.value.trim();
    mName.textContent = w;
    mTask.innerHTML = t ? `assigned to: <strong>${esc(t)}</strong>` : `has been selected!`;
    mw.classList.add('show');
    confetti();
  }

  /* ── Confetti ── */
  function confetti() {
    const colors = ['#f5c542','#ff6b35','#4ecdc4','#fd79a8','#a29bfe','#55efc4','#ffd166'];
    for (let i = 0; i < 90; i++) {
      const el = document.createElement('div');
      el.className = 'cf';
      const w = 6 + Math.random() * 10;
      el.style.cssText = `left:${Math.random()*100}vw;top:-18px;
        width:${w}px;height:${w*(Math.random()>.5?1:0.38)}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'2px'};
        animation-duration:${1.3+Math.random()*2.2}s;
        animation-delay:${Math.random()*.9}s;`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  /* ── Events ── */
  spinBtn.addEventListener('click', spin);
  hub.addEventListener('click', spin);
  addBtn.addEventListener('click', add);
  newName.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  mOk.addEventListener('click', () => mw.classList.remove('show'));
  mw.addEventListener('click', e => { if (e.target === mw) mw.classList.remove('show'); });

  renderList();
</script>
</body>
</html>
